<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>小樽への扉</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Shippori+Mincho:wght@400;500;600;800&family=Noto+Sans+JP:wght@300;400;500;700&display=swap" rel="stylesheet">
<style>
  :root{
    --navy: #171f2e;
    --navy-deep: #0d121c;
    --brass: #b8935a;
    --brass-light: #d9bd8e;
    --ivory: #f4ecd9;
    --canal: #4a6b5c;
    --glass: rgba(244,236,217,0.06);
  }
  *{box-sizing:border-box; margin:0; padding:0;}
  html,body{
    height:100%;
    background: radial-gradient(ellipse at 50% 20%, #212c40 0%, var(--navy) 45%, var(--navy-deep) 100%);
    font-family: "Noto Sans JP", sans-serif;
    color: var(--ivory);
    overflow-x:hidden;
  }
  body{
    min-height:100vh;
    display:flex;
    align-items:center;
    justify-content:center;
    padding: 32px 20px;
    position:relative;
  }

  .particle{
    position:fixed;
    top:-10px;
    width:3px; height:3px;
    border-radius:50%;
    background: var(--brass-light);
    opacity:0.5;
    filter: blur(0.3px);
    animation: drift linear infinite;
    pointer-events:none;
  }
  @keyframes drift{
    to { transform: translateY(110vh) translateX(20px); opacity:0; }
  }

  .stage{
    width:100%;
    max-width: 440px;
    text-align:center;
    position:relative;
    z-index:2;
  }

  .eyebrow{
    font-family:"Shippori Mincho", serif;
    letter-spacing: 0.35em;
    font-size: 12px;
    color: var(--brass-light);
    opacity:0.85;
    margin-bottom: 18px;
  }

  h1{
    font-family:"Shippori Mincho", serif;
    font-weight:600;
    font-size: clamp(24px, 6vw, 30px);
    letter-spacing: 0.08em;
    color: var(--ivory);
    margin-bottom: 8px;
  }
  .sub{
    font-size: 13px;
    color: var(--brass-light);
    opacity:0.75;
    letter-spacing:0.05em;
    margin-bottom: 40px;
  }

  .box-wrap{
    position:relative;
    width: 230px;
    height: 230px;
    margin: 0 auto 36px;
  }

  .base{
    position:absolute;
    bottom:0; left:50%;
    transform: translateX(-50%);
    width: 200px;
    height: 46px;
    border-radius: 10px;
    background: linear-gradient(180deg, #2a3650, #131a28);
    border: 1px solid rgba(184,147,90,0.35);
    box-shadow: 0 18px 30px rgba(0,0,0,0.45), inset 0 1px 0 rgba(255,255,255,0.05);
  }
  .base::after{
    content:"";
    position:absolute;
    top:8px; left:50%;
    transform: translateX(-50%);
    width: 60px; height: 6px;
    border-radius: 3px;
    background: rgba(184,147,90,0.25);
  }

  .dome{
    position:absolute;
    bottom: 40px; left:50%;
    transform: translateX(-50%);
    width: 176px;
    height: 176px;
    border-radius: 50% 50% 6px 6px / 55% 55% 6px 6px;
    background:
      radial-gradient(circle at 35% 25%, rgba(255,255,255,0.10), rgba(255,255,255,0.0) 45%),
      linear-gradient(160deg, rgba(184,147,90,0.14), rgba(20,26,40,0.35));
    border: 1px solid rgba(184,147,90,0.5);
    box-shadow:
      inset 0 0 30px rgba(184,147,90,0.08),
      0 0 40px rgba(184,147,90,0.05);
    backdrop-filter: blur(1px);
    transition: transform 1.4s cubic-bezier(.6,.1,.2,1), opacity 1.1s ease;
    transform-origin: 50% 100%;
  }

  .dome.open{
    transform: translateX(-50%) translateY(-120px) rotateX(60deg);
    opacity: 0;
  }

  .gear{
    position:absolute;
    border: 2px solid var(--brass);
    border-radius: 50%;
    opacity: 0.85;
  }
  .gear::before{
    content:"";
    position:absolute;
    inset: -6px;
    border-radius:50%;
    border: 2px dashed rgba(184,147,90,0.4);
  }
  .g1{ width:46px; height:46px; top: 66px; left: 62px; animation: spin 8s linear infinite; }
  .g2{ width:30px; height:30px; top: 52px; left: 108px; animation: spin 6s linear infinite reverse; }
  .g3{ width:24px; height:24px; top: 96px; left: 110px; animation: spin 5s linear infinite; }
  @keyframes spin{ to { transform: rotate(360deg); } }

  .key-hole{
    position:absolute;
    bottom: 58px; left:50%;
    transform: translateX(-50%);
    width: 14px; height: 14px;
    border-radius: 50%;
    background: var(--navy-deep);
    box-shadow: 0 0 0 2px rgba(184,147,90,0.6), 0 0 12px rgba(184,147,90,0.5);
  }
  .key-hole::after{
    content:"";
    position:absolute;
    top: 10px; left:50%;
    transform: translateX(-50%);
    width: 4px; height: 8px;
    background: var(--navy-deep);
    box-shadow: 0 0 0 2px rgba(184,147,90,0.6);
  }

  .glow{
    position:absolute;
    inset: -20px;
    border-radius:50%;
    background: radial-gradient(circle, rgba(184,147,90,0.25), transparent 70%);
    opacity:0;
    transition: opacity 1s ease;
    pointer-events:none;
  }
  .glow.on{ opacity:1; animation: pulse 2.4s ease-in-out infinite; }
  @keyframes pulse{ 0%,100%{ opacity:0.5; } 50%{ opacity:0.9; } }

  .panel{
    background: var(--glass);
    border: 1px solid rgba(184,147,90,0.28);
    border-radius: 4px;
    padding: 22px 22px 24px;
    text-align: left;
  }
  .panel + .panel{ margin-top: 14px; }

  .status-line{
    display:flex;
    align-items:flex-start;
    gap: 10px;
    font-size: 13.5px;
    line-height: 1.9;
    color: var(--ivory);
    opacity: 0.9;
  }
  .status-line + .status-line{ margin-top: 10px; }
  .dot{
    flex: 0 0 auto;
    width: 7px; height: 7px;
    border-radius: 50%;
    margin-top: 8px;
    background: rgba(184,147,90,0.35);
    box-shadow: 0 0 0 3px rgba(184,147,90,0.08);
  }
  .dot.ok{ background: var(--brass); box-shadow: 0 0 8px var(--brass); }

  .hint{
    font-size: 12px;
    color: var(--brass-light);
    opacity: 0.65;
    margin-top: 16px;
    line-height: 1.7;
  }

  button{
    font-family:"Noto Sans JP", sans-serif;
    font-size: 14px;
    letter-spacing: 0.1em;
    color: var(--navy-deep);
    background: linear-gradient(180deg, var(--brass-light), var(--brass));
    border: none;
    padding: 13px 30px;
    border-radius: 999px;
    cursor: pointer;
    margin-top: 20px;
    box-shadow: 0 8px 18px rgba(184,147,90,0.25);
    transition: transform 0.2s ease, box-shadow 0.2s ease;
    display: block;
    margin-left: auto;
    margin-right: auto;
  }
  button:hover{ transform: translateY(-1px); box-shadow: 0 10px 22px rgba(184,147,90,0.35); }
  button:active{ transform: translateY(0px); }
  button:disabled{ opacity:0.5; cursor:default; }

  .ticket{
    display:none;
    text-align:center;
    animation: reveal 1.2s ease both;
  }
  .ticket.show{ display:block; }
  @keyframes reveal{
    from{ opacity:0; transform: translateY(14px); }
    to{ opacity:1; transform: translateY(0); }
  }
  .ticket-card{
    position:relative;
    background: linear-gradient(160deg, #241d14, #171106);
    border: 1px solid var(--brass);
    border-radius: 8px;
    padding: 30px 26px 26px;
    box-shadow: 0 24px 50px rgba(0,0,0,0.5), inset 0 0 40px rgba(184,147,90,0.06);
  }
  .ticket-eyebrow{
    font-size: 11px;
    letter-spacing: 0.4em;
    color: var(--brass-light);
    opacity:0.8;
  }
  .ticket-title{
    font-family:"Shippori Mincho", serif;
    font-size: 24px;
    font-weight: 700;
    margin: 10px 0 4px;
    color: var(--ivory);
  }
  .ticket-sub{
    font-size: 12px;
    color: var(--brass-light);
    opacity:0.7;
    margin-bottom: 20px;
  }
  .ticket-divider{
    width: 60px; height:1px;
    margin: 0 auto 20px;
    background: rgba(184,147,90,0.5);
  }
  .ticket-body{
    font-family:"Shippori Mincho", serif;
    font-size: 15px;
    line-height: 2.1;
    color: var(--ivory);
    text-align: left;
  }
  .ticket-sign{
    margin-top: 22px;
    font-size: 12px;
    letter-spacing:0.15em;
    color: var(--brass-light);
    text-align: right;
    opacity:0.8;
  }
  .notch{
    position:absolute;
    width: 18px; height: 18px;
    background: var(--navy-deep);
    border-radius: 50%;
    top: 50%;
    transform: translateY(-50%);
  }
  .notch.left{ left: -9px; }
  .notch.right{ right: -9px; }

  .footer-note{
    margin-top: 26px;
    font-size: 11px;
    color: var(--brass-light);
    opacity: 0.4;
    letter-spacing: 0.1em;
  }
</style>
</head>
<body>

<div class="stage">
  <div class="eyebrow">OTARU MUSIC BOX HALL</div>
  <h1>小樽への扉</h1>
  <div class="sub">この扉は、あの日、あの場所でだけ開く</div>

  <div class="box-wrap" id="boxWrap">
    <div class="glow" id="glow"></div>
    <div class="dome" id="dome">
      <div class="gear g1"></div>
      <div class="gear g2"></div>
      <div class="gear g3"></div>
    </div>
    <div class="key-hole"></div>
    <div class="base"></div>
  </div>

  <div id="lockedView">
    <div class="panel">
      <div class="status-line">
        <div class="dot" id="dotDate"></div>
        <div id="txtDate">まだ、その日ではない</div>
      </div>
      <div class="status-line">
        <div class="dot" id="dotLoc"></div>
        <div id="txtLoc">まだ、その場所ではない</div>
      </div>
      <div class="hint">位置情報の確認が必要です。小樽オルゴール堂に着いたら、下のボタンを押してみてください。</div>
      <button id="checkBtn">扉を確かめる</button>
    </div>
  </div>

  <div class="ticket" id="ticketView">
    <div class="ticket-card">
      <div class="notch left"></div>
      <div class="notch right"></div>
      <div class="ticket-eyebrow">PRESENT TICKET</div>
      <div class="ticket-title">オルゴール プレゼント券</div>
      <div class="ticket-sub">小樽オルゴール堂にて・お好きな一台をどうぞ</div>
      <div class="ticket-divider"></div>
      <div class="ticket-body">
        ゆきさんへ<br><br>
        誕生日おめでとう。<br>
        この扉は、7月8日、あなたが小樽に着く日まで開かないように鍵をかけておきました。<br><br>
        今日という日を、この店の音色とともに。<br>
        気に入った一台を、好きなだけ選んでください。
      </div>
      <div class="ticket-sign">司郎より</div>
    </div>
  </div>

  <div class="footer-note">HAPPY BIRTHDAY 7.8</div>
</div>

<script>
  const TARGET_DATE = new Date("2026-07-08T00:00:00+09:00");
  const OTARU_LAT = 43.1907;
  const OTARU_LNG = 141.0016;
  const RADIUS_M = 3000;

  const dotDate = document.getElementById('dotDate');
  const dotLoc = document.getElementById('dotLoc');
  const txtDate = document.getElementById('txtDate');
  const txtLoc = document.getElementById('txtLoc');
  const dome = document.getElementById('dome');
  const glow = document.getElementById('glow');
  const lockedView = document.getElementById('lockedView');
  const ticketView = document.getElementById('ticketView');
  const checkBtn = document.getElementById('checkBtn');

  function haversine(lat1, lon1, lat2, lon2){
    const R = 6371000;
    const toRad = d => d * Math.PI / 180;
    const dLat = toRad(lat2-lat1);
    const dLon = toRad(lon2-lon1);
    const a = Math.sin(dLat/2)**2 + Math.cos(toRad(lat1))*Math.cos(toRad(lat2))*Math.sin(dLon/2)**2;
    return 2 * R * Math.asin(Math.sqrt(a));
  }

  function isDateOk(){
    return new Date() >= TARGET_DATE;
  }

  function unlock(){
    glow.classList.add('on');
    dome.classList.add('open');
    setTimeout(() => {
      lockedView.style.display = 'none';
      ticketView.classList.add('show');
    }, 900);
  }

  function reveal(dateOk, locOk){
    dotDate.classList.toggle('ok', dateOk);
    dotLoc.classList.toggle('ok', locOk);
    txtDate.textContent = dateOk ? "その日は、もう来ている" : "まだ、その日ではない";
    txtLoc.textContent = locOk ? "その場所に、あなたはいる" : "まだ、その場所ではない";

    if (dateOk && locOk){
      unlock();
    } else if (dateOk && !locOk){
      checkBtn.textContent = "扉を確かめる";
      checkBtn.disabled = false;
    } else {
      checkBtn.textContent = "扉を確かめる";
      checkBtn.disabled = false;
    }
  }

  checkBtn.addEventListener('click', () => {
    const dateOk = isDateOk();

    if (!dateOk){
      reveal(false, false);
      return;
    }

    if (!('geolocation' in navigator)){
      txtLoc.textContent = "位置情報が使えない端末のようです";
      return;
    }

    checkBtn.disabled = true;
    checkBtn.textContent = "確かめています…";

    navigator.geolocation.getCurrentPosition(
      (pos) => {
        const dist = haversine(pos.coords.latitude, pos.coords.longitude, OTARU_LAT, OTARU_LNG);
        const locOk = dist <= RADIUS_M;
        reveal(true, locOk);
        if (!locOk){
          checkBtn.disabled = false;
        }
      },
      (err) => {
        txtLoc.textContent = "位置情報の許可が必要です";
        checkBtn.disabled = false;
        checkBtn.textContent = "もう一度試す";
      },
      { enableHighAccuracy: true, timeout: 10000 }
    );
  });

  (function initial(){
    const dateOk = isDateOk();
    dotDate.classList.toggle('ok', dateOk);
    txtDate.textContent = dateOk ? "その日は、もう来ている" : "まだ、その日ではない";
  })();

  (function checkPreview(){
    const params = new URLSearchParams(window.location.search);
    if (params.get('preview') === '1'){
      reveal(true, true);
    }
  })();

  const stage = document.body;
  for (let i=0;i<26;i++){
    const p = document.createElement('div');
    p.className = 'particle';
    p.style.left = Math.random()*100 + 'vw';
    p.style.animationDuration = (8 + Math.random()*10) + 's';
    p.style.animationDelay = (Math.random()*10) + 's';
    p.style.width = p.style.height = (1.5 + Math.random()*2) + 'px';
    stage.appendChild(p);
  }
</script>
</body>
</html>
